<div class="container my-5">
  <div class="row g-5">

    <!-- Contact Info Column -->
    <div class="col-md-5">
      <h2 class="fw-bold mb-4">Get in Touch</h2>
      <p class="text-muted">Fill out the form and our team will get back to you within 24 hours.</p>

      <div class="mt-4">
        <div class="d-flex mb-3">
          <i class="bi bi-geo-alt-fill text-primary me-3 fs-4"></i>
          <p>123 Store St, Cairo, Egypt</p>
        </div>
        <div class="d-flex mb-3">
          <i class="bi bi-envelope-fill text-primary me-3 fs-4"></i>
          <p>support&#64;mystore.com</p>
        </div>
        <div class="d-flex mb-3">
          <i class="bi bi-telephone-fill text-primary me-3 fs-4"></i>
          <p>+20 123 456 789</p>
        </div>
      </div>
    </div>

    <!-- Contact Form Column -->
    <div class="col-md-7">
      <div class="card shadow-sm border-0 p-4">
        <form>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" placeholder="John Doe">
            </div>
            <div class="col-md-6">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" placeholder="name&#64;example.com">
            </div>
            <div class="col-12">
              <label class="form-label">Subject</label>
              <input type="text" class="form-control">
            </div>
            <div class="col-12">
              <label class="form-label">Message</label>
              <textarea class="form-control" rows="5"></textarea>
            </div>
            <div class="col-12">
              <button class="btn btn-dark w-100 py-2 mt-3" type="submit">Send Message</button>
            </div>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>
